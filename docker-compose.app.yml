services:
  auth-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - marketplace

  auth-migrate:
    build:
      context: .
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      POSTGRES_HOST: auth-postgres
      POSTGRES_DATABASE_NAME: auth_db
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - marketplace

  auth-service:
    build:
      context: .
    command: ["uv", "run", "python", "-m", "bin.api"]
    environment:
      POSTGRES_HOST: auth-postgres
      POSTGRES_DATABASE_NAME: auth_db
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    networks:
      - marketplace

networks:
  marketplace:
    name: marketplace
    external: true

volumes:
  pgdata:
